<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Carrossel Simples</title>

<style>
  body {
    font-family: Arial;
    display: flex;
    justify-content: center;
    margin-top: 50px;
  }

  .carousel {
    position: relative;
    width: 400px;
    height: 250px;
    overflow: hidden;
  }

  .carousel img {
    width: 100%;
    height: 100%;
    display: none;
  }

  .carousel img.active {
    display: block;
  }

  .arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 30px;
    background: rgba(0,0,0,0.5);
    color: white;
    border: none;
    cursor: pointer;
    padding: 10px;
  }

  .left {
    left: 10px;
  }

  .right {
    right: 10px;
  }
</style>
</head>

<body>

<div class="carousel">
  <button class="arrow left" onclick="prev()">❮</button>

  <img src="https://picsum.photos/id/1015/400/250" class="active">
  <img src="https://picsum.photos/id/1016/400/250">
  <img src="https://picsum.photos/id/1018/400/250">

  <button class="arrow right" onclick="next()">❯</button>
</div>

<script>
  let index = 0;
  const images = document.querySelectorAll(".carousel img");

  function showImage(i) {
    images.forEach(img => img.classList.remove("active"));
    images[i].classList.add("active");
  }

  function next() {
    index = (index + 1) % images.length;
    showImage(index);
  }

  function prev() {
    index = (index - 1 + images.length) % images.length;
    showImage(index);
  }
</script>

</body>
</html>
